name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check main
        run: npx tsc --project tsconfig.main.json --noEmit

      - name: Type check preload
        run: npx tsc --project tsconfig.preload.json --noEmit

      - name: Type check renderer
        run: npx tsc --project tsconfig.json --noEmit

      - name: Build renderer
        run: npm run build:renderer

      - name: Build main + preload
        run: |
          npm run build:main
          npm run build:preload
